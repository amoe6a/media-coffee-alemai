<svg viewBox="0 0 1000 775" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="aBrown" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#8a6648"/></marker>
    <marker id="aGreen" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#3E8E5A"/></marker>
    <marker id="aRed" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#C25450"/></marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#3E2A1F" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1000" height="775" fill="#FAF6EE"/>

  <!-- title -->
  <text x="40" y="48" font-size="28" font-weight="700" fill="#3E2A1F">How an order travels ☕</text>
  <text x="40" y="74" font-size="14" fill="#6F4E37">Your coffee shop's Telegram bot — from first tap to happy customer</text>

  <!-- legend -->
  <line x1="724" y1="44" x2="766" y2="44" stroke="#3E8E5A" stroke-width="2.5" marker-end="url(#aGreen)"/>
  <text x="776" y="48" font-size="12" fill="#3E2A1F">barista accepted</text>
  <line x1="724" y1="68" x2="766" y2="68" stroke="#C25450" stroke-width="2.5" stroke-dasharray="6 5" marker-end="url(#aRed)"/>
  <text x="776" y="72" font-size="12" fill="#3E2A1F">barista rejected</text>

  <!-- lanes -->
  <rect x="28"  y="100" width="300" height="494" rx="16" fill="#FFFDF9" stroke="#E7D9C2"/>
  <rect x="350" y="100" width="300" height="494" rx="16" fill="#F6ECDD" stroke="#E2CFAF"/>
  <rect x="672" y="100" width="300" height="494" rx="16" fill="#FFFDF9" stroke="#E7D9C2"/>

  <text x="178" y="130" font-size="17" font-weight="700" fill="#6F4E37" text-anchor="middle">🙋 Customer</text>
  <text x="178" y="147" font-size="11" font-style="italic" fill="#9b7c5f" text-anchor="middle">your guest</text>
  <text x="500" y="130" font-size="17" font-weight="700" fill="#5C3D2A" text-anchor="middle">🤖 Coffee Bot</text>
  <text x="500" y="147" font-size="11" font-style="italic" fill="#9b7c5f" text-anchor="middle">works 24/7, never tired</text>
  <text x="822" y="130" font-size="17" font-weight="700" fill="#6F4E37" text-anchor="middle">👩‍🍳 Barista</text>
  <text x="822" y="147" font-size="11" font-style="italic" fill="#9b7c5f" text-anchor="middle">your team</text>
  <line x1="48" y1="156" x2="308" y2="156" stroke="#E7D9C2"/>
  <line x1="370" y1="156" x2="630" y2="156" stroke="#E2CFAF"/>
  <line x1="692" y1="156" x2="952" y2="156" stroke="#E7D9C2"/>

  <!-- step 1: browse -->
  <rect x="52" y="170" width="252" height="56" rx="12" fill="#FFFFFF" stroke="#E3D2B8" filter="url(#soft)"/>
  <text x="70" y="193" font-size="14.5" font-weight="600" fill="#3E2A1F">Browses the menu</text>
  <text x="70" y="212" font-size="12" fill="#7a5c44">photos, prices, what's in stock</text>
  <circle cx="52" cy="170" r="13" fill="#6F4E37"/>
  <text x="52" y="175" font-size="13" font-weight="700" fill="#FFF" text-anchor="middle">1</text>
  <line x1="178" y1="226" x2="178" y2="248" stroke="#8a6648" stroke-width="2.2" marker-end="url(#aBrown)"/>

  <!-- step 2: place order -->
  <rect x="52" y="254" width="252" height="56" rx="12" fill="#FFFFFF" stroke="#E3D2B8" filter="url(#soft)"/>
  <text x="70" y="277" font-size="14.5" font-weight="600" fill="#3E2A1F">Places the order</text>
  <text x="70" y="296" font-size="12" fill="#7a5c44">cart + phone + delivery address</text>
  <circle cx="52" cy="254" r="13" fill="#6F4E37"/>
  <text x="52" y="259" font-size="13" font-weight="700" fill="#FFF" text-anchor="middle">2</text>
  <line x1="304" y1="282" x2="370" y2="282" stroke="#8a6648" stroke-width="2.2" marker-end="url(#aBrown)"/>

  <!-- step 3: bot pings baristas -->
  <rect x="374" y="254" width="252" height="56" rx="12" fill="#FFFFFF" stroke="#E3D2B8" filter="url(#soft)"/>
  <text x="392" y="277" font-size="14.5" font-weight="600" fill="#3E2A1F">Pings every barista</text>
  <text x="392" y="296" font-size="12" fill="#7a5c44">the full order, instantly</text>
  <g transform="rotate(6 592 281)">
    <rect x="574" y="264" width="36" height="34" rx="3" fill="#FFFDF6" stroke="#D8C3A4"/>
    <line x1="580" y1="272" x2="604" y2="272" stroke="#C9B08C" stroke-width="2"/>
    <line x1="580" y1="279" x2="604" y2="279" stroke="#C9B08C" stroke-width="2"/>
    <line x1="580" y1="286" x2="596" y2="286" stroke="#C9B08C" stroke-width="2"/>
    <line x1="580" y1="293" x2="600" y2="293" stroke="#A98D66" stroke-width="2"/>
  </g>
  <rect x="566" y="246" width="44" height="16" rx="8" fill="#C49A6C"/>
  <text x="588" y="258" font-size="9.5" font-weight="700" fill="#FFF" text-anchor="middle" letter-spacing="1">AUTO</text>
  <circle cx="374" cy="254" r="13" fill="#6F4E37"/>
  <text x="374" y="259" font-size="13" font-weight="700" fill="#FFF" text-anchor="middle">3</text>
  <line x1="626" y1="282" x2="692" y2="282" stroke="#8a6648" stroke-width="2.2" marker-end="url(#aBrown)"/>

  <!-- step 4: barista decides -->
  <rect x="696" y="246" width="252" height="78" rx="12" fill="#FFFFFF" stroke="#E3D2B8" filter="url(#soft)"/>
  <text x="822" y="274" font-size="14.5" font-weight="600" fill="#3E2A1F" text-anchor="middle">Accept or reject?</text>
  <rect x="707" y="288" width="112" height="26" rx="13" fill="#E8F4EC" stroke="#3E8E5A"/>
  <text x="763" y="305" font-size="12.5" font-weight="600" fill="#2e6b44" text-anchor="middle">✅ Accept</text>
  <rect x="825" y="288" width="112" height="26" rx="13" fill="#F9E9E8" stroke="#C25450"/>
  <text x="881" y="305" font-size="12.5" font-weight="600" fill="#a33f3b" text-anchor="middle">❌ Reject</text>
  <circle cx="696" cy="246" r="13" fill="#6F4E37"/>
  <text x="696" y="251" font-size="13" font-weight="700" fill="#FFF" text-anchor="middle">4</text>

  <!-- green path: accept -->
  <line x1="763" y1="324" x2="763" y2="352" stroke="#3E8E5A" stroke-width="2.5" marker-end="url(#aGreen)"/>
  <path d="M740 330 L700 330 L700 386 L634 386" fill="none" stroke="#3E8E5A" stroke-width="2.5" marker-end="url(#aGreen)"/>

  <!-- bot: stock + message (auto) -->
  <rect x="374" y="358" width="252" height="56" rx="12" fill="#FFFFFF" stroke="#BFDCCB" filter="url(#soft)"/>
  <text x="392" y="381" font-size="14.5" font-weight="600" fill="#3E2A1F">Updates the stock</text>
  <text x="392" y="400" font-size="12" fill="#7a5c44">and messages the customer</text>
  <rect x="566" y="350" width="44" height="16" rx="8" fill="#C49A6C"/>
  <text x="588" y="362" font-size="9.5" font-weight="700" fill="#FFF" text-anchor="middle" letter-spacing="1">AUTO</text>
  <line x1="374" y1="386" x2="300" y2="380" stroke="#3E8E5A" stroke-width="2.5" marker-end="url(#aGreen)"/>

  <!-- customer bubble 1 -->
  <rect x="68" y="356" width="215" height="46" rx="12" fill="#E8F4EC" stroke="#3E8E5A" filter="url(#soft)"/>
  <polygon points="283,370 297,378 283,386" fill="#E8F4EC" stroke="#3E8E5A"/>
  <text x="175" y="384" font-size="13" fill="#2e6b44" text-anchor="middle">👩‍🍳 “Being prepared!”</text>

  <!-- step 5: prepare & deliver -->
  <rect x="696" y="358" width="252" height="56" rx="12" fill="#FFFFFF" stroke="#E3D2B8" filter="url(#soft)"/>
  <text x="714" y="381" font-size="14.5" font-weight="600" fill="#3E2A1F">Prepares &amp; delivers 🛵</text>
  <text x="714" y="400" font-size="12" fill="#7a5c44">fresh and on time</text>
  <circle cx="696" cy="358" r="13" fill="#6F4E37"/>
  <text x="696" y="363" font-size="13" font-weight="700" fill="#FFF" text-anchor="middle">5</text>
  <line x1="822" y1="414" x2="822" y2="456" stroke="#3E8E5A" stroke-width="2.5" marker-end="url(#aGreen)"/>

  <!-- step 6: completed -->
  <rect x="696" y="462" width="252" height="56" rx="12" fill="#FFFFFF" stroke="#E3D2B8" filter="url(#soft)"/>
  <text x="714" y="485" font-size="14.5" font-weight="600" fill="#3E2A1F">Taps 🏁 “Completed”</text>
  <text x="714" y="504" font-size="12" fill="#7a5c44">right after the handoff</text>
  <circle cx="696" cy="462" r="13" fill="#6F4E37"/>
  <text x="696" y="467" font-size="13" font-weight="700" fill="#FFF" text-anchor="middle">6</text>
  <line x1="696" y1="490" x2="300" y2="484" stroke="#3E8E5A" stroke-width="2.5" marker-end="url(#aGreen)"/>

  <!-- customer bubble 2 -->
  <rect x="68" y="460" width="215" height="46" rx="12" fill="#E8F4EC" stroke="#3E8E5A" filter="url(#soft)"/>
  <polygon points="283,474 297,482 283,490" fill="#E8F4EC" stroke="#3E8E5A"/>
  <text x="175" y="488" font-size="13" fill="#2e6b44" text-anchor="middle">✅ “Delivered — enjoy! ☕”</text>
  <circle cx="68" cy="460" r="13" fill="#3E8E5A"/>
  <text x="68" y="465" font-size="13" font-weight="700" fill="#FFF" text-anchor="middle">7</text>

  <!-- red path: reject -->
  <path d="M905 324 C 958 352, 958 470, 958 500 L958 526 C958 546, 938 552, 900 552 L640 552" fill="none" stroke="#C25450" stroke-width="2.5" stroke-dasharray="6 5" marker-end="url(#aRed)"/>
  <rect x="374" y="528" width="252" height="50" rx="12" fill="#FDF6F5" stroke="#C25450" filter="url(#soft)"/>
  <text x="392" y="549" font-size="14" font-weight="600" fill="#a33f3b">❌ Order rejected</text>
  <text x="392" y="567" font-size="12" fill="#a3645f">customer instantly gets the reason</text>
  <rect x="566" y="520" width="44" height="16" rx="8" fill="#C49A6C"/>
  <text x="588" y="532" font-size="9.5" font-weight="700" fill="#FFF" text-anchor="middle" letter-spacing="1">AUTO</text>
  <line x1="374" y1="553" x2="262" y2="553" stroke="#C25450" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#aRed)"/>
  <text x="160" y="557" font-size="12.5" font-style="italic" fill="#a3645f" text-anchor="middle">😔 “maybe next time…”</text>

  <!-- admin band -->
  <line x1="500" y1="616" x2="500" y2="600" stroke="#8a6648" stroke-width="2.2" marker-end="url(#aBrown)"/>
  <rect x="28" y="620" width="944" height="92" rx="18" fill="#5C3D2A" filter="url(#soft)"/>
  <text x="52" y="650" font-size="16" font-weight="700" fill="#F5EFE6">Behind the counter — the owner (that's you ☕)</text>
  <rect x="52" y="664" width="308" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.12" stroke="#F5EFE6" stroke-opacity="0.35"/>
  <text x="68" y="684" font-size="12.5" fill="#F5EFE6">📊 Menu from one Excel file — photos included</text>
  <rect x="374" y="664" width="156" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.12" stroke="#F5EFE6" stroke-opacity="0.35"/>
  <text x="390" y="684" font-size="12.5" fill="#F5EFE6">📷 Add item photos</text>
  <rect x="544" y="664" width="190" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.12" stroke="#F5EFE6" stroke-opacity="0.35"/>
  <text x="560" y="684" font-size="12.5" fill="#F5EFE6">🔢 Adjust stock anytime</text>
  <text x="752" y="676" font-size="11.5" font-style="italic" fill="#E8D9C5">…and the menu the bot shows</text>
  <text x="752" y="692" font-size="11.5" font-style="italic" fill="#E8D9C5">updates instantly ↑</text>

  <!-- footer -->
  <text x="40" y="748" font-size="12" font-style="italic" fill="#8a6f57">No payment gateways — guests pay on delivery as usual. Every arrow above is a real Telegram message.</text>
</svg>
